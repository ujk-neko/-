<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>宇都宮城址公園制作漫画ー</title>
    <style>
        body { text-align: center; background: #1a1a1a; color: white; font-family: sans-serif; }
        .manga-container { margin-top: 20px; }
        img { max-width: 100%; height: auto; border: 2px solid #444; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; }
        #prevBtn { background: #555; color: white; margin-right: 10px; }
        #nextBtn { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="manga-container">
        <img id="mangaPage" src="01.jpg" alt="漫画のページ">
    </div>

    <div class="controls">
        <button id="prevBtn">前へ</button>
        <span id="pageInfo">1 / 10</span>
        <button id="nextBtn">次へ</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
